<header class="header">
  <!-- <img class="logo" src="../../../../assets/Streamscape.svg" routerLink="/"> -->
  <div class="logo">Streamscape</div>
  <div *ngIf="!usuario" class="login-button" routerLink="/login">Entrar</div>
  <div *ngIf="usuario" class="user-section" (click)="toggleMenu()">
    <div class="flex-container">
      <div class="user-avatar">
        {{ usuario.nome.charAt(0) }}
      </div>
    </div>
    <div class="user-info" *ngIf="menuOpen">
      <div class="user-profile">
        <div class="user-credentials">
          <div class="email">
            {{ usuario.email }}
          </div>
          <div class="username">
            &#64;{{ usuario.username }}
          </div>
        </div>
        <div class="avatar">
          {{ usuario.nome.charAt(0) }}
        </div>
        <div class="fullname">
          {{ usuario.nome }}
          {{ usuario.sobrenome }}
        </div>
      </div>
      <div class="menu">
        <ul>
          <li>
            <div class="menu-button" role="button" routerLink="/account">Minha conta</div>
          </li>
          <li>
            <div class="menu-button logout" role="button" (click)="logout()">Sair</div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
